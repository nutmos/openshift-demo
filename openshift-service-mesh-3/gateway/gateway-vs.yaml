apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: bookinfo-gateway
  namespace: bookinfo
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 8080
      name: http-80
      protocol: HTTP
    hosts:
    - '*'
  - port:
      number: 8443
      name: http-80
      protocol: HTTP
    hosts:
    - '*'
    tls:
      mode: SIMPLE
  #- port:
  #    number: 443
  #    name: https-443
  #    protocol: HTTPS
  #  hosts:
  #  - '*'
  #  tls:
  #    mode: SIMPLE
  #    serverCertificate: /etc/certs/servercert.pem
  #    privateKey: /etc/certs/privatekey.pem
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: bookinfo-rule
  namespace: bookinfo
spec:
  hosts:
  - bookinfo-gateway-bookinfo.apps.cluster-m6jjv.m6jjv.sandbox5299.opentlc.com 
  gateways:
  - bookinfo-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        port:
          number: 9080
        host: productpage.bookinfo.svc.cluster.local