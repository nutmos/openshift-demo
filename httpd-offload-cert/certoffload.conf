Listen 8080

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule ssl_module modules/mod_ssl.so

<VirtualHost *:8080>
    ServerName apache-proxy.internal
    
    # 1. Enable the SSL Proxy Engine 
    # This tells Apache to act as an SSL client for outbound requests
    SSLProxyEngine On

    # 2. Optional: Security/Verification Settings
    # If Service B uses a self-signed cert, you might need to turn these Off 
    # for testing, but keep them On for production.
    SSLProxyVerify none 
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerExpire off

    # 3. The Proxy Logic
    # Service A calls http://apache-proxy:8080/
    # Apache calls https://service-b.com/
    ProxyPass / https://service-b.com/
    ProxyPassReverse / https://service-b.com/

    # 4. Ensure the Host header matches what Service B expects
    ProxyPreserveHost Off
</VirtualHost>